name: Playwright Tests -> Xray

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 5️⃣ Ensure test-results folder exists
      - name: Prepare test-results folder
        run: mkdir -p test-results

      # 6️⃣ Run Playwright tests (make sure your Playwright config outputs JUnit XML to test-results/results.xml)
      - name: Run Playwright tests
        run: npx playwright test

      # 7️⃣ Verify JUnit XML exists
      - name: Check JUnit XML
        run: |
          echo "Listing test-results folder:"
          ls -la test-results
          if [ ! -f "test-results/results.xml" ]; then
            echo " results.xml not found! Did you configure Playwright reporter correctly?"
            exit 1
          fi
          echo " results.xml found. First 20 lines:"
          head -n 20 test-results/results.xml

      # 8️⃣ Authenticate with Xray Cloud
      - name: Authenticate with Xray Cloud
        id: xray-auth
        run: |
          echo "Authenticating to Xray Cloud..."
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"client_id\": \"${{secrets.XRAY_CLIENT_ID}}\", \"client_secret\": \"${{secrets.XRAY_CLIENT_SECRET}}\"}" \
            https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # 9️⃣ Create info.json and upload JUnit results to Xray Cloud
      - name: Upload JUnit results to Xray Cloud
        if: always()
        run: |
          echo "Uploading JUnit results to Xray..."
          
          curl -v -H "Authorization: Bearer ${{ steps.xray-auth.outputs.token }}" \
               -H "Content-Type: multipart/form-data" \
               -F "file=@test-results/results.xml" \
               "https://xray.cloud.getxray.app/api/v2/import/execution/junit?testExecKey=TA-1"