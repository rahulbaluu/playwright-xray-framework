name: Playwright Tests -> Xray

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Ensure test-results folder exists
      - name: Prepare test-results folder
        run: mkdir -p test-results

      # Run Playwright tests with JUnit reporter
      - name: Run Playwright tests
        run: npx playwright test

      # Verify JUnit XML exists
      - name: Check JUnit XML
        run: |
          echo "Listing test-results folder:"
          ls -la test-results
          if [ ! -f "test-results/results.xml" ]; then
            echo " results.xml not found! Did you configure Playwright reporter correctly?"
            exit 1
          fi
          echo " results.xml found. First 20 lines:"
          head -n 20 test-results/results.xml

      # Authenticate with Xray Cloud
      - name: Authenticate with Xray Cloud
        id: xray-auth
        run: |
          echo "Authenticating to Xray Cloud..."
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"client_id\": \"${{secrets.XRAY_CLIENT_ID}}\", \"client_secret\": \"${{secrets.XRAY_CLIENT_SECRET}}\"}" \
            https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # Upload JUnit results to Xray Cloud
      - name: Upload JUnit results to Xray Cloud
        if: always()
        run: |
            echo "Uploading JUnit results to Xray..."
            curl -v \
              -H "Authorization: Bearer ${{ steps.xray-auth.outputs.token }}" \
              -F "file=@test-results/results.xml" \
              -F "info={\"fields\":{\"project\":{\"key\":\"TA\"},\"summary\":\"Playwright Automated Execution\",\"issuetype\":{\"name\":\"Test Execution\"}}};type=application/json" \
              https://xray.cloud.getxray.app/api/v2/import/execution/junit

        