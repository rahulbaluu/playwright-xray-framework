name: Playwright Tests -> Xray
on:
  push:
    branches: [main]
  pull_request:
  
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4 
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Authenticate with Xray Cloud
      id: xray-auth
      run: |
          echo "Authenticating to Xray Cloud..."
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"client_id\": \"${{secrets.XRAY_CLIENT_ID}}\", \"client_secret\": \"${{secrets.XRAY_CLIENT_SECRET}}\"}" \
            https://xray.cloud.getxray.app/api/v2/authenticate | tr -d '"')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Upload Junit results to Xray Cloud
      run: |
        curl -X POST \
          -H "Content-Type: multipart/form-data" \
          -H "Authorization: Bearer ${{ steps.xray-auth.outputs.token }}" \
          -F "file=@test-results/results.xml" \
          "https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=TA"